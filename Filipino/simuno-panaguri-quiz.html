<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filipino Quiz – Simuno, Panaguri & Uri ng Pangungusap</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F172A;
    --card: #1E293B;
    --card2: #162032;
    --accent: #F59E0B;
    --accent2: #10B981;
    --accent3: #3B82F6;
    --danger: #EF4444;
    --text: #F1F5F9;
    --muted: #94A3B8;
    --border: #334155;
    --tag-simuno: #7C3AED;
    --tag-panaguri: #0891B2;
    --tag-uri: #15803D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 80px;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(245,158,11,.07) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(59,130,246,.07) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown .6s ease both;
  }

  .pill-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .pill {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 4px 12px;
    border-radius: 99px;
    text-transform: uppercase;
  }
  .pill.s { background: rgba(124,58,237,.25); color: #C4B5FD; border: 1px solid rgba(124,58,237,.4); }
  .pill.p { background: rgba(8,145,178,.25); color: #67E8F9; border: 1px solid rgba(8,145,178,.4); }
  .pill.u { background: rgba(21,128,61,.25); color: #6EE7B7; border: 1px solid rgba(21,128,61,.4); }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    line-height: 1.1;
    background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 40%, #10B981 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { font-size: .88rem; color: var(--muted); margin-top: 6px; font-weight: 600; }

  /* ── PROGRESS ── */
  .meta-row {
    width: 100%;
    max-width: 660px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: .82rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
    animation: fadeDown .7s ease both;
  }

  .score-badge {
    background: rgba(245,158,11,.15);
    border: 1px solid rgba(245,158,11,.3);
    color: var(--accent);
    padding: 3px 12px;
    border-radius: 99px;
    font-size: .78rem;
  }

  .prog-track {
    width: 100%;
    max-width: 660px;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 20px;
    overflow: hidden;
    animation: fadeDown .75s ease both;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, #F59E0B, #10B981);
    border-radius: 99px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px 26px 22px;
    max-width: 660px;
    width: 100%;
    margin-bottom: 16px;
    animation: slideUp .4s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #7C3AED, #0891B2, #15803D);
  }

  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .q-num {
    font-family: 'Fredoka One', cursive;
    font-size: .85rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .topic-tag {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: 2px 10px;
    border-radius: 99px;
  }
  .topic-tag.simuno { background: rgba(124,58,237,.2); color: #C4B5FD; }
  .topic-tag.panaguri { background: rgba(8,145,178,.2); color: #67E8F9; }
  .topic-tag.uri { background: rgba(21,128,61,.2); color: #6EE7B7; }
  .topic-tag.mixed { background: rgba(245,158,11,.2); color: #FDE68A; }

  .q-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 18px;
  }

  .q-text .hl {
    color: #FBBF24;
    font-style: italic;
  }

  /* ── OPTIONS ── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }

  @media (max-width: 420px) { .options { grid-template-columns: 1fr; } }

  .opt {
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 11px 14px;
    font-family: 'Poppins', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s, transform .12s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .opt-letter {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem;
    font-weight: 800;
    flex-shrink: 0;
    transition: background .15s;
  }

  .opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(245,158,11,.06);
    transform: translateY(-2px);
  }

  .opt.correct {
    background: rgba(16,185,129,.12);
    border-color: var(--accent2);
    color: #6EE7B7;
    animation: pop .3s ease;
  }
  .opt.correct .opt-letter { background: var(--accent2); color: #fff; }

  .opt.wrong {
    background: rgba(239,68,68,.1);
    border-color: var(--danger);
    color: #FCA5A5;
    animation: shake .35s ease;
  }
  .opt.wrong .opt-letter { background: var(--danger); color: #fff; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: .84rem;
    font-weight: 600;
    display: none;
    line-height: 1.5;
  }
  .feedback.show { display: block; animation: fadeIn .3s ease; }
  .feedback.ok { background: rgba(16,185,129,.1); border-left: 3px solid var(--accent2); color: #6EE7B7; }
  .feedback.no { background: rgba(239,68,68,.1); border-left: 3px solid var(--danger); color: #FCA5A5; }

  /* ── NEXT BTN ── */
  .next-btn {
    display: none;
    margin: 0 auto;
    background: linear-gradient(135deg, #F59E0B, #D97706);
    color: #0F172A;
    border: none;
    border-radius: 99px;
    padding: 12px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,158,11,.3);
    transition: transform .15s, box-shadow .15s;
    letter-spacing: .02em;
  }
  .next-btn.show { display: block; animation: fadeIn .3s ease; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(245,158,11,.45); }

  /* ── SCORE SCREEN ── */
  .score-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 560px;
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 28px;
    animation: popBig .5s ease both;
    position: relative;
    overflow: hidden;
  }

  .score-screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #F59E0B, #10B981, #3B82F6, #7C3AED);
  }

  .score-screen.show { display: flex; }

  .big-icon { font-size: 5rem; margin-bottom: 10px; }
  .stars-row { font-size: 2rem; margin-bottom: 10px; letter-spacing: .1em; }

  .score-screen h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 6px;
  }

  .score-num {
    font-family: 'Fredoka One', cursive;
    font-size: 4rem;
    background: linear-gradient(135deg, #F59E0B, #10B981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 8px 0;
  }

  .score-sub { font-size: .9rem; color: var(--muted); font-weight: 600; margin-bottom: 6px; }

  .score-msg {
    font-size: .9rem;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 28px;
    line-height: 1.6;
    max-width: 380px;
  }

  /* breakdown */
  .breakdown {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .bd-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    text-align: center;
    min-width: 110px;
  }

  .bd-item .bd-num {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
  }

  .bd-item .bd-label { font-size: .7rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .bd-item.s .bd-num { color: #C4B5FD; }
  .bd-item.p .bd-num { color: #67E8F9; }
  .bd-item.u .bd-num { color: #6EE7B7; }

  .retry-btn {
    background: linear-gradient(135deg, #3B82F6, #0891B2);
    color: #fff;
    border: none;
    border-radius: 99px;
    padding: 13px 44px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(59,130,246,.3);
    transition: transform .15s;
    letter-spacing: .02em;
  }
  .retry-btn:hover { transform: translateY(-2px); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes pop {
    0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes popBig {
    from { opacity: 0; transform: scale(.88); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<header>
  <div class="pill-row">
    <span class="pill s">Simuno</span>
    <span class="pill p">Panaguri</span>
    <span class="pill u">Uri ng Pangungusap</span>
  </div>
  <h1>Filipino Grammar Quiz</h1>
  <p>20 tanong · Grade 5 · Piliin ang tamang sagot</p>
</header>

<div class="meta-row">
  <span id="q-counter">Tanong 1 sa 20</span>
  <span class="score-badge" id="live-score">Iskor: 0</span>
</div>
<div class="prog-track"><div class="prog-fill" id="prog" style="width:5%"></div></div>

<div class="card" id="quiz-card">
  <div class="q-header">
    <span class="q-num" id="q-num">01</span>
    <span class="topic-tag" id="topic-tag">Simuno</span>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
</div>

<button class="next-btn" id="next-btn">Susunod →</button>

<div class="score-screen" id="score-screen">
  <div class="big-icon" id="big-icon">🏆</div>
  <div class="stars-row" id="stars"></div>
  <h2>Tapos na ang Quiz!</h2>
  <div class="score-num" id="final-score"></div>
  <div class="score-sub">sa 20 tanong</div>
  <div class="score-msg" id="score-msg"></div>
  <div class="breakdown" id="breakdown"></div>
  <button class="retry-btn" onclick="restart()">🔄 Subukan Ulit</button>
</div>

<script>
const QS = [
  // ── SIMUNO (7 items) ──
  {
    topic: "simuno",
    tag: "Simuno",
    q: "Ano ang <span class='hl'>simuno</span> sa pangungusap na ito?\n\"Ang masayang bata ay tumatawa nang malakas.\"",
    opts: ["tumatawa", "ang masayang bata", "nang malakas", "malakas"],
    ans: 1,
    explain: "Ang SIMUNO ay ang paksa ng pangungusap — ang tinatanong kung 'sino' o 'ano'. Dito, 'Ang masayang bata' ang paksa."
  },
  {
    topic: "simuno",
    tag: "Simuno",
    q: "Hanapin ang simuno:\n\"Si Gng. Reyes ay nagtuturo ng Filipino.\"",
    opts: ["nagtuturo", "ng Filipino", "Si Gng. Reyes", "Filipino"],
    ans: 2,
    explain: "Si Gng. Reyes ang simuno dahil siya ang tinutukoy sa pangungusap."
  },
  {
    topic: "simuno",
    tag: "Simuno",
    q: "Aling bahagi ang simuno?\n\"Ang puting ulap ay lumilipad sa langit.\"",
    opts: ["lumilipad", "sa langit", "ay lumilipad", "Ang puting ulap"],
    ans: 3,
    explain: "'Ang puting ulap' ang simuno — ito ang paksang pinag-uusapan sa pangungusap."
  },
  {
    topic: "simuno",
    tag: "Simuno",
    q: "Ano ang simuno:\n\"Kumakain ng mansanas ang batang lalaki.\"",
    opts: ["Kumakain", "ng mansanas", "ang batang lalaki", "mansanas"],
    ans: 2,
    explain: "Kahit nasa hulihan, 'ang batang lalaki' pa rin ang simuno — siya ang nagsasagawa ng kilos."
  },
  {
    topic: "simuno",
    tag: "Simuno",
    q: "Sa pangungusap na \"Lumangoy si Maria sa dagat,\" ano ang simuno?",
    opts: ["Lumangoy", "sa dagat", "dagat", "si Maria"],
    ans: 3,
    explain: "'Si Maria' ang simuno. Ang mga pangngalan na may 'si/sina' ay karaniwang simuno ng pangungusap."
  },
  {
    topic: "simuno",
    tag: "Simuno",
    q: "Alin ang HINDI maaaring simuno ng pangungusap?",
    opts: ["Ang guro", "Si Pedro", "Sina Ana at Ben", "Mabilis na"],
    ans: 3,
    explain: "'Mabilis na' ay pandiwa o pang-abay, hindi pangngalan kaya hindi ito karaniwang simuno."
  },
  {
    topic: "simuno",
    tag: "Simuno",
    q: "Anong salita ang nagsisilbing simuno?\n\"Tumalon ang malaking aso.\"",
    opts: ["Tumalon", "ang malaking aso", "malaking", "aso"],
    ans: 1,
    explain: "'Ang malaking aso' ang buong simuno. Kasama ang pantukoy na 'ang' at pang-uri na 'malaking'."
  },

  // ── PANAGURI (7 items) ──
  {
    topic: "panaguri",
    tag: "Panaguri",
    q: "Ano ang <span class='hl'>panaguri</span> sa pangungusap na:\n\"Ang bata ay natutulog ng mahimbing.\"",
    opts: ["Ang bata", "ay natutulog ng mahimbing", "natutulog", "ng mahimbing"],
    ans: 1,
    explain: "Ang PANAGURI ay ang bahagi ng pangungusap na nagsasabi ng ginagawa, katangian, o kalagayan ng simuno."
  },
  {
    topic: "panaguri",
    tag: "Panaguri",
    q: "Hanapin ang panaguri:\n\"Si Kuya Jose ay matalino at masipag.\"",
    opts: ["Si Kuya Jose", "ay matalino at masipag", "matalino", "masipag"],
    ans: 1,
    explain: "'Ay matalino at masipag' ang panaguri — ito ang naglalarawan kay Kuya Jose."
  },
  {
    topic: "panaguri",
    tag: "Panaguri",
    q: "Ano ang panaguri sa:\n\"Sumayaw nang maganda ang dalaga.\"",
    opts: ["ang dalaga", "ang maganda", "Sumayaw nang maganda", "dalaga"],
    ans: 2,
    explain: "Sa di-karaniwang ayos, 'Sumayaw nang maganda' ang panaguri kahit nasa unahan ito."
  },
  {
    topic: "panaguri",
    tag: "Panaguri",
    q: "Alin sa sumusunod ang panaguri ng pangungusap na:\n\"Ang mga bulaklak ay namumukadkad sa hardin.\"",
    opts: ["Ang mga bulaklak", "namumukadkad", "ay namumukadkad sa hardin", "sa hardin"],
    ans: 2,
    explain: "'Ay namumukadkad sa hardin' ang buong panaguri."
  },
  {
    topic: "panaguri",
    tag: "Panaguri",
    q: "Sa \"Masaya ang Pista Opisyal,\" ano ang panaguri?",
    opts: ["ang Pista Opisyal", "Masaya", "Masaya ang", "Pista Opisyal"],
    ans: 1,
    explain: "'Masaya' ang panaguri — ito ang nagsasabi ng kalagayan ng Pista Opisyal."
  },
  {
    topic: "panaguri",
    tag: "Panaguri",
    q: "Sa pangungusap na \"Naglalaro ang mga bata sa labas,\" alin ang panaguri?",
    opts: ["Ang mga bata", "sa labas", "Naglalaro ... sa labas", "mga bata"],
    ans: 2,
    explain: "'Naglalaro sa labas' ang panaguri — ito ang nagsasabi ng ginagawa ng mga bata."
  },
  {
    topic: "panaguri",
    tag: "Panaguri",
    q: "Alin ang PANAGURI sa:\n\"Ang pinakamataas na bundok ay Mt. Apo.\"",
    opts: ["Ang pinakamataas na bundok", "Mt. Apo", "ay Mt. Apo", "pinakamataas"],
    ans: 2,
    explain: "'Ay Mt. Apo' ang panaguri — sinasabi nito kung ano ang pinakamataas na bundok."
  },

  // ── URI NG PANGUNGUSAP (6 items) ──
  {
    topic: "uri",
    tag: "Uri ng Pangungusap",
    q: "Anong uri ng pangungusap ito?\n\"<span class='hl'>Karaniwan o Di-karaniwang Ayos:</span>\nAng kalabaw ay nagtatrabaho sa bukid.\"",
    opts: ["Di-karaniwang ayos", "Karaniwan na ayos", "Walang simuno", "Pahayag na pangungusap"],
    ans: 1,
    explain: "KARANIWAN na ayos — simuno muna (Ang kalabaw), tapos ay (ay), tapos panaguri (nagtatrabaho sa bukid)."
  },
  {
    topic: "uri",
    tag: "Uri ng Pangungusap",
    q: "Ano ang uri ng ayos ng pangungusap na:\n\"Lumakad nang matulin ang bata.\"",
    opts: ["Karaniwan na ayos", "Di-karaniwang ayos", "Walang simuno", "Tanong"],
    ans: 1,
    explain: "DI-KARANIWANG ayos — panaguri muna (Lumakad nang matulin) bago ang simuno (ang bata)."
  },
  {
    topic: "uri",
    tag: "Uri ng Pangungusap",
    q: "Sa <span class='hl'>karaniwan na ayos</span>, ano ang tamang pagkakasunod?",
    opts: [
      "Panaguri → Simuno",
      "Simuno → ay → Panaguri",
      "Panaguri → ay → Simuno",
      "Simuno → Panaguri (walang ay)"
    ],
    ans: 1,
    explain: "Sa KARANIWAN na ayos: Simuno + ay + Panaguri. Halimbawa: 'Ang guro ay nagtuturo.'"
  },
  {
    topic: "uri",
    tag: "Uri ng Pangungusap",
    q: "Alin sa mga ito ang nasa <span class='hl'>di-karaniwang ayos</span>?",
    opts: [
      "Ang puno ay mataas.",
      "Si Ana ay masipag.",
      "Kumanta nang maganda si Lea.",
      "Ang ibon ay lumilipad."
    ],
    ans: 2,
    explain: "'Kumanta nang maganda si Lea' — panaguri muna bago ang simuno, kaya di-karaniwang ayos."
  },
  {
    topic: "uri",
    tag: "Uri ng Pangungusap",
    q: "Paano mo isusulat ang \"Tumakbo ang mabilis na kabayo\" sa <span class='hl'>karaniwan na ayos</span>?",
    opts: [
      "Ang mabilis na kabayo ay tumakbo.",
      "Tumakbo ay ang mabilis na kabayo.",
      "Mabilis na tumakbo ang kabayo.",
      "Ay tumakbo ang mabilis na kabayo."
    ],
    ans: 0,
    explain: "Karaniwan na ayos: Simuno (Ang mabilis na kabayo) + ay + Panaguri (tumakbo)."
  },
  {
    topic: "uri",
    tag: "Uri ng Pangungusap",
    q: "Alin ang TAMA tungkol sa di-karaniwang ayos ng pangungusap?",
    opts: [
      "Laging nagsisimula sa 'ang' o 'si'",
      "Panaguri ang unang bahagi, simuno ang huli",
      "Simuno ang unang bahagi, panaguri ang huli",
      "Walang simuno o panaguri"
    ],
    ans: 1,
    explain: "Sa DI-KARANIWANG ayos, ang panaguri ay nasa unahan at ang simuno ay nasa hulihan ng pangungusap."
  }
];

let cur = 0, score = 0, answered = false;
const topicScore = { simuno: [0,0], panaguri: [0,0], uri: [0,0] };

function load() {
  answered = false;
  const q = QS[cur];
  document.getElementById('q-num').textContent = String(cur+1).padStart(2,'0');
  document.getElementById('q-counter').textContent = `Tanong ${cur+1} sa ${QS.length}`;
  document.getElementById('prog').style.width = `${((cur+1)/QS.length)*100}%`;

  const tag = document.getElementById('topic-tag');
  tag.textContent = q.tag;
  tag.className = 'topic-tag ' + q.topic;

  document.getElementById('q-text').innerHTML = q.q.replace(/\n/g,'<br>');

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';

  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((o,i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${o}`;
    btn.onclick = () => pick(i, btn, q);
    opts.appendChild(btn);
  });
}

function pick(i, btn, q) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  const nb = document.getElementById('next-btn');
  const allBtns = document.querySelectorAll('.opt');
  const letters = ['A','B','C','D'];

  topicScore[q.topic][1]++;

  if (i === q.ans) {
    btn.classList.add('correct');
    btn.innerHTML = `<span class="opt-letter">✓</span>${q.opts[i]}`;
    score++;
    topicScore[q.topic][0]++;
    document.getElementById('live-score').textContent = `Iskor: ${score}`;
    fb.className = 'feedback ok show';
    fb.textContent = `✅ Tama! ${q.explain}`;
  } else {
    btn.classList.add('wrong');
    btn.innerHTML = `<span class="opt-letter">✗</span>${q.opts[i]}`;
    allBtns[q.ans].classList.add('correct');
    allBtns[q.ans].innerHTML = `<span class="opt-letter">✓</span>${q.opts[q.ans]}`;
    fb.className = 'feedback no show';
    fb.textContent = `❌ Mali. Tamang sagot: "${q.opts[q.ans]}". ${q.explain}`;
  }

  nb.className = 'next-btn show';
  nb.textContent = cur < QS.length - 1 ? 'Susunod →' : 'Tingnan ang Iskor 🎉';
}

document.getElementById('next-btn').onclick = () => {
  cur++;
  if (cur < QS.length) load();
  else showScore();
};

function showScore() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.querySelector('.prog-track').style.display = 'none';
  document.querySelector('.meta-row').style.display = 'none';

  const ss = document.getElementById('score-screen');
  ss.classList.add('show');

  const pct = score / QS.length;
  document.getElementById('final-score').textContent = score;

  let icon, stars, msg;
  if (pct === 1)      { icon='🏆'; stars='⭐⭐⭐⭐⭐'; msg='Perpekto! Dalubhasa ka na sa Simuno, Panaguri, at Uri ng Pangungusap! 🎊'; }
  else if (pct >= .85){ icon='🥇'; stars='⭐⭐⭐⭐'; msg='Napakahusay! Konting kulang na lang sa perpekto. Magaling ka talaga! 💪'; }
  else if (pct >= .70){ icon='🥈'; stars='⭐⭐⭐'; msg='Magaling! Pag-aralan pa ang mga napalagi mong mali para mapabuti pa. 😊'; }
  else if (pct >= .50){ icon='🥉'; stars='⭐⭐'; msg='Sige! Basahin ulit ang aralin at subukan muli. Kaya mo! 📖'; }
  else                { icon='📚'; stars='⭐'; msg='Mag-review pa ng kaunti at subukan muli. Huwag sumuko! 🌟'; }

  document.getElementById('big-icon').textContent = icon;
  document.getElementById('stars').textContent = stars;
  document.getElementById('score-msg').textContent = msg;

  const bd = document.getElementById('breakdown');
  const topics = [
    { key:'simuno',   label:'Simuno',           cls:'s' },
    { key:'panaguri', label:'Panaguri',          cls:'p' },
    { key:'uri',      label:'Uri ng Pangungusap',cls:'u' }
  ];
  bd.innerHTML = topics.map(t =>
    `<div class="bd-item ${t.cls}">
      <div class="bd-num">${topicScore[t.key][0]}/${topicScore[t.key][1]}</div>
      <div class="bd-label">${t.label}</div>
    </div>`
  ).join('');
}

function restart() {
  cur = 0; score = 0;
  topicScore.simuno = [0,0];
  topicScore.panaguri = [0,0];
  topicScore.uri = [0,0];
  document.getElementById('live-score').textContent = 'Iskor: 0';
  document.getElementById('quiz-card').style.display = 'block';
  document.querySelector('.prog-track').style.display = 'block';
  document.querySelector('.meta-row').style.display = 'flex';
  document.getElementById('next-btn').style.display = '';
  document.getElementById('score-screen').classList.remove('show');
  load();
}

load();
</script>
</body>
</html>
