<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polynomial Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #14141f;
    --card: #1a1a2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #2d2d45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; animation: float1 12s ease-in-out infinite; }
  .blob-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -150px; animation: float2 15s ease-in-out infinite; }

  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 52px; }
  .tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid rgba(6,182,212,0.3);
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  /* Progress */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 6px;
    margin-bottom: 40px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(.4,0,.2,1);
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  @keyframes slideIn {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .question-number {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .question-type-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    margin-left: 10px;
    font-weight: 500;
  }
  .badge-add { background: rgba(16,185,129,0.15); color: var(--correct); border: 1px solid rgba(16,185,129,0.3); }
  .badge-sub { background: rgba(239,68,68,0.15); color: var(--wrong); border: 1px solid rgba(239,68,68,0.3); }
  .badge-mix { background: rgba(245,158,11,0.15); color: var(--accent3); border: 1px solid rgba(245,158,11,0.3); }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .math { color: var(--accent2); }

  /* Options */
  .options { display: grid; gap: 12px; }
  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(6,182,212,0.1));
    transition: opacity 0.2s;
  }
  .option-btn:hover:not(:disabled)::before { opacity: 1; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); transform: translateX(4px); }
  .option-btn:disabled { cursor: default; }

  .option-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    background: var(--border);
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option-btn.correct { border-color: var(--correct); background: rgba(16,185,129,0.1); }
  .option-btn.correct .option-letter { background: var(--correct); color: #fff; }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.1); }
  .option-btn.wrong .option-letter { background: var(--wrong); color: #fff; }

  /* Feedback */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    animation: fadeIn 0.3s ease;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .feedback.wrong-fb { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 20px;
  }
  .btn {
    padding: 13px 28px;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.4); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

  /* Results */
  .results {
    text-align: center;
    animation: slideIn 0.5s cubic-bezier(.4,0,.2,1);
    display: none;
  }
  .results.show { display: block; }
  .score-ring {
    width: 160px; height: 160px;
    margin: 0 auto 32px;
    position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring-fill {
    fill: none; stroke-width: 10; stroke-linecap: round;
    stroke: url(#ringGrad);
    transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
  }
  .score-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-denom { font-size: 13px; color: var(--muted); }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 10px;
  }
  .result-msg { color: var(--muted); font-size: 14px; margin-bottom: 40px; }

  .review-grid { display: grid; gap: 10px; margin-bottom: 36px; text-align: left; }
  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 13px;
  }
  .review-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .review-q { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .review-a { color: var(--text); }

  .quiz-section { display: block; }

</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrapper">
  <div class="header">
    <div class="tag">Mathematics</div>
    <h1>Polynomial Quiz</h1>
    <p class="subtitle">Addition &amp; Subtraction · Monomials, Binomials &amp; Polynomials</p>
  </div>

  <div class="quiz-section" id="quizSection">
    <div class="progress-label">
      <span id="progressText">Question 1 of 10</span>
      <span id="scoreText">Score: 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-number" id="qNumber">QUESTION 01 <span class="question-type-badge" id="typeBadge"></span></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsGrid"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="nav">
      <button class="btn btn-primary" id="nextBtn" disabled onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <div class="results" id="resultsSection">
    <svg width="0" height="0">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <defs>
          <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="score-ring-bg" cx="80" cy="80" r="70"/>
        <circle class="score-ring-fill" id="ringFill" cx="80" cy="80" r="70"
          stroke-dasharray="439.82" stroke-dashoffset="439.82"/>
      </svg>
      <div class="score-center">
        <div class="score-num" id="finalScore">0</div>
        <div class="score-denom">out of 10</div>
      </div>
    </div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="review-grid" id="reviewGrid"></div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin:0 auto;display:block">↺ Try Again</button>
  </div>
</div>

<script>
const questions = [
  {
    type: 'add', badge: 'addition', badgeClass: 'badge-add',
    text: 'Add the monomials: 3x + 5x = ?',
    options: ['8x²', '8x', '15x', '2x'],
    answer: 1,
    explanation: '3x + 5x = (3+5)x = 8x. Combine like terms by adding coefficients.'
  },
  {
    type: 'sub', badge: 'subtraction', badgeClass: 'badge-sub',
    text: 'Subtract: 9y² − 4y² = ?',
    options: ['5y', '5y²', '13y²', '36y⁴'],
    answer: 1,
    explanation: '9y² − 4y² = (9−4)y² = 5y². Same variable and exponent, so subtract coefficients.'
  },
  {
    type: 'add', badge: 'addition', badgeClass: 'badge-add',
    text: 'Add the binomials: (2x + 3) + (4x + 7) = ?',
    options: ['6x + 10', '6x + 4', '8x + 10', '6x² + 10'],
    answer: 0,
    explanation: 'Group like terms: (2x+4x) + (3+7) = 6x + 10.'
  },
  {
    type: 'sub', badge: 'subtraction', badgeClass: 'badge-sub',
    text: 'Subtract the binomials: (5x − 2) − (3x − 6) = ?',
    options: ['2x − 8', '2x + 4', '8x + 4', '2x − 4'],
    answer: 1,
    explanation: 'Distribute the negative: 5x − 2 − 3x + 6 = (5x−3x) + (−2+6) = 2x + 4.'
  },
  {
    type: 'mix', badge: 'mixed', badgeClass: 'badge-mix',
    text: 'Simplify: (3a² + 2a) + (a² − 5a) = ?',
    options: ['4a² − 3a', '4a² + 7a', '2a² − 3a', '4a⁴ − 3a²'],
    answer: 0,
    explanation: 'Combine like terms: (3a²+a²) + (2a−5a) = 4a² − 3a.'
  },
  {
    type: 'sub', badge: 'subtraction', badgeClass: 'badge-sub',
    text: 'Subtract: (6x² + 4x + 1) − (2x² + x + 3) = ?',
    options: ['4x² + 5x − 2', '4x² + 3x − 2', '4x² + 3x + 4', '8x² + 5x + 4'],
    answer: 1,
    explanation: '(6x²−2x²) + (4x−x) + (1−3) = 4x² + 3x − 2.'
  },
  {
    type: 'add', badge: 'addition', badgeClass: 'badge-add',
    text: 'Add the monomials: −7m³ + 3m³ = ?',
    options: ['−4m³', '4m³', '−10m³', '−4m⁶'],
    answer: 0,
    explanation: '−7m³ + 3m³ = (−7+3)m³ = −4m³.'
  },
  {
    type: 'mix', badge: 'mixed', badgeClass: 'badge-mix',
    text: 'Simplify: (4x² − 3) + (−4x² + 5) = ?',
    options: ['0x² + 2', '8x² + 2', '2', '−8x² + 2'],
    answer: 2,
    explanation: '(4x²−4x²) + (−3+5) = 0 + 2 = 2. The x² terms cancel out!'
  },
  {
    type: 'sub', badge: 'subtraction', badgeClass: 'badge-sub',
    text: 'Subtract: (8p² + 2p) − (8p² − 2p) = ?',
    options: ['0', '4p', '16p²', '4p²'],
    answer: 1,
    explanation: '8p² + 2p − 8p² + 2p = (8p²−8p²) + (2p+2p) = 0 + 4p = 4p.'
  },
  {
    type: 'mix', badge: 'mixed', badgeClass: 'badge-mix',
    text: 'What is the result of: (3x² − 2x + 4) − (x² + x − 6)?',
    options: ['2x² − 3x − 2', '2x² − x + 10', '2x² − 3x + 10', '4x² − x − 2'],
    answer: 2,
    explanation: 'Distribute: 3x²−2x+4 − x²−x+6 = (3x²−x²)+(−2x−x)+(4+6) = 2x² − 3x + 10.'
  }
];

let current = 0, score = 0, answered = false;
const userAnswers = new Array(10).fill(null);

function loadQuestion() {
  const q = questions[current];
  answered = false;

  document.getElementById('qNumber').innerHTML =
    `QUESTION ${String(current+1).padStart(2,'0')} <span class="question-type-badge ${q.badgeClass}">${q.badge}</span>`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `Question ${current+1} of 10`;
  document.getElementById('scoreText').textContent = `Score: ${score}`;
  document.getElementById('progressBar').style.width = `${(current/10)*100}%`;
  document.getElementById('nextBtn').disabled = true;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  // Re-animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'slideIn 0.4s cubic-bezier(.4,0,.2,1)';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  userAnswers[current] = idx;

  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  if (idx === q.answer) {
    score++;
    btns[idx].classList.add('correct');
    showFeedback(true, '✓ Correct! ' + q.explanation);
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    showFeedback(false, '✗ Not quite. ' + q.explanation);
  }

  document.getElementById('scoreText').textContent = `Score: ${score}`;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = current < 9 ? 'Next →' : 'See Results →';
}

function showFeedback(correct, msg) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = `feedback show ${correct ? 'correct-fb' : 'wrong-fb'}`;
}

function nextQuestion() {
  if (current < 9) {
    current++;
    loadQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('quizSection').style.display = 'none';
  const res = document.getElementById('resultsSection');
  res.classList.add('show');

  document.getElementById('finalScore').textContent = score;

  const circumference = 2 * Math.PI * 70;
  const offset = circumference - (score/10) * circumference;
  setTimeout(() => {
    document.getElementById('ringFill').style.strokeDashoffset = offset;
  }, 100);

  const titles = ['Keep Practicing!', 'Getting There!', 'Good Work!', 'Great Job!', 'Outstanding!'];
  const msgs = [
    'Review the fundamentals of combining like terms and try again.',
    'You understand some concepts — keep reviewing and you\'ll improve!',
    'Solid understanding! A bit more practice and you\'ll master it.',
    'You clearly grasp polynomial operations. Keep it up!',
    'Perfect score! You\'ve mastered polynomial addition & subtraction!'
  ];
  const tier = score <= 3 ? 0 : score <= 5 ? 1 : score <= 7 ? 2 : score <= 9 ? 3 : 4;
  document.getElementById('resultTitle').textContent = titles[tier];
  document.getElementById('resultMsg').textContent = msgs[tier];

  const grid = document.getElementById('reviewGrid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const correct = userAnswers[i] === q.answer;
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <span class="review-icon">${correct ? '✅' : '❌'}</span>
      <div>
        <div class="review-q">Q${i+1}: ${q.text}</div>
        <div class="review-a">Answer: ${q.options[q.answer]}</div>
      </div>`;
    grid.appendChild(div);
  });
}

function restartQuiz() {
  current = 0; score = 0;
  userAnswers.fill(null);
  document.getElementById('quizSection').style.display = 'block';
  document.getElementById('resultsSection').classList.remove('show');
  document.getElementById('ringFill').style.strokeDashoffset = '439.82';
  loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
